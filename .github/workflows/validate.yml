name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Lint every SKILL.md (frontmatter, cross-refs, marketplace.json)
        run: python3 scripts/validate-skills.py
      - name: Run risk_matrix_scorer self-test
        run: python3 skills/critical-risk-manager/scripts/risk_matrix_scorer.py --selftest
